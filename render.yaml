services:
  - type: web
    name: grantflow
    env: node
    region: frankfurt
    plan: free
    buildCommand: npm install && cd client && npm install && npm run build
    startCommand: node index.js
    envVars:
      - key: NODE_ENV
        value: production
    disk:
      name: grantflow-db
      mountPath: /opt/render/project/src
      sizeGB: 1
